name: volcanic-hermes-doctor
version: 1.0.0
description: "Public-safe Hermes troubleshooting profile for diagnosing install, config, provider, toolset, profile, and runtime issues from redacted logs."
author: "Volcanic"
license: MIT
hermes_requires: ">=0.15.0"
env_requires: []
distribution_owned:
  - README.md
  - SOUL.md
  - config.yaml
  - distribution.yaml
  - profile.yaml
  - .env.EXAMPLE
  - .gitignore
  - LICENSE
  - cron/README.md
  - scripts/profile_secret_scan.py
  - skills/hermes-troubleshooting-triage/SKILL.md
  - skills/redacted-issue-report/SKILL.md
  - templates/redacted_issue_report.md
